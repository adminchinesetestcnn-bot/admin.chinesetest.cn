    padding:12px;
    font-size:15px;

.label{

    background:#fafafa;

}
.score-title{
    padding:15px;
    font-weight:700;
    font-size:18px;
}
.score-table th{
    background:#f7f7f7;
}
.score-table td{

    font-size:20px;
}
.footer{
    margin-top:20px;
    text-align:center;
    color:#777;
    font-size:14px;
}
.page-bottom{

@media(max-width:768px){

        padding:16px;

    .score-table td{font-size:18px;}
    .page-bottom{height:60px;}
}
@media print{

        padding:0;
    }
    .page{

        min-height:297mm;
